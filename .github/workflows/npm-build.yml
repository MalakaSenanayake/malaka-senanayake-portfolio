name: Deploy Angular App to GitHub Pages

on:
  push:
    branches: [ "production" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.19.0'

    - name: Install dependencies
      run: |
        if [ -f package-lock.json ]; then
          echo "🔒 package-lock.json found — running npm ci"
          npm ci
        else
          echo "⚠️ No package-lock.json found — falling back to npm install"
          npm install
        fi

    - name: Build Angular app
      run: npx ng build --configuration production --aot --optimization --base-href https://malakasenanayake.com/

    - name: Minify HTML
      run: |
        npm install -g html-minifier-terser
        html-minifier-terser --collapse-whitespace --remove-comments --remove-optional-tags --minify-css true --minify-js true -o dist/malaka-senanayake-portfolio/browser/index.html dist/malaka-senanayake-portfolio/browser/index.html

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/production'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: gh-pages
        folder: dist/malaka-senanayake-portfolio/browser
        clean: false
