name: Deploy Angular App to GitHub Pages
on:
  push:
    branches: ["production"]  # Make sure this matches your default branch
  pull_request:
    branches: ["production"]
permissions:
  contents: write
  pages: write        # ✅ Added for deploy job
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'  # Very specific version - '22' would be fine too
          cache: 'npm'             # ✅ Add caching for faster builds
          
      - name: Install dependencies
        run: npm ci
    
      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
    
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/malaka-senanayake-portfolio/browser'  # ✅ This looks correct for Angular 17+

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy  # ✅ Fixed job name
    permissions:             # ✅ Added permissions
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
