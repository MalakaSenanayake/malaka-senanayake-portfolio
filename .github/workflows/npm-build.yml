name: NodeJS with Grunt

on:
  push:
    branches: [ "production" ]
  pull_request:
    branches: [ "production" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.19.0]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build
      run: |
        npm install
        npm run build --configuration production --base-href https://MalakaSenanayake.github.io/malaka-senanayake-portfolio/ && npx angular-cli-ghpages --dir=dist/malaka-senanayake-portfolio/browser
       

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v6
      with:
          branch: gh-pages
          folder: dist/malaka-senanayake-portfolio/browser   # <-- include /browser
          clean: true
