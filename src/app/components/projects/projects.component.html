<section class="projects-section container">
  <div class="section-title">
    <h2>My Projects</h2>
  </div>

  <div class="projects-filter">
    <button *ngFor="let c of categories"
            (click)="setFilter(c.key)"
            [class.active]="selectedCategory === c.key"
            class="filter-btn">
      {{ c.label }}
    </button>
  </div>

  <div class="projects-grid">
    <div *ngFor="let project of filteredProjects" class="project-card">
      <img [src]="project.image" [alt]="project.title" class="project-img" />
      <div class="project-content">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        <div class="project-tags">
          <span *ngFor="let t of project.tags" class="project-tag">{{ t }}</span>
        </div>
        <div class="project-links">
          <a *ngIf="project.repoUrl" [href]="project.repoUrl" class="project-link" target="_blank" rel="noopener">
            <i class="fab fa-github"></i> Code
          </a>
          <a *ngIf="project.liveUrl" [href]="project.liveUrl" class="project-link" target="_blank" rel="noopener">
            <i class="fas fa-external-link-alt"></i> Live Demo
          </a>
          <a *ngIf="project.docsUrl" [href]="project.docsUrl" class="project-link" target="_blank" rel="noopener">
            <i class="fas fa-book"></i> Docs
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
