<section @listIn>
  <h2>Projects</h2>
  <p class="lead">A selection of work — click to view source or demos.</p>

  <div class="grid" style="grid-template-columns: 1fr; gap:1rem; margin-top:1rem;">
    <ng-container *ngFor="let p of projects">
      <app-project-card
        [title]="p.title"
        [description]="p.description"
        [tech]="p.tech"
        [github]="p.github"
        [demo]="p.demo">
      </app-project-card>
    </ng-container>
  </div>
</section>
