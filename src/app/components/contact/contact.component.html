<section class="contact container">
  <div class="section-title"><h2>Get In Touch</h2></div>

  <div class="contact-content">
    <div class="contact-info">
      <div class="contact-item">
        <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
        <div class="contact-details">
          <h4>Location</h4>
          <p>Gampaha, Sri Lanka</p>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon"><i class="fas fa-envelope"></i></div>
        <div class="contact-details">
          <h4>Email</h4>
          <p>contact.malaka.senanayake gmail.com</p>
        </div>
      </div>

      <div class="social-links">
        <a href="#" class="social-link"><i class="fab fa-github"></i></a>
        <a href="#" class="social-link"><i class="fab fa-linkedin-in"></i></a>
        <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
      </div>

    </div>

    <div class="contact-form">
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <input formControlName="name" type="text" class="form-control" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <input formControlName="email" type="email" class="form-control" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <input formControlName="subject" type="text" class="form-control" placeholder="Subject" required>
        </div>
        <div class="form-group">
          <textarea formControlName="message" class="form-control" placeholder="Your Message" required></textarea>
        </div>
        <div class="form-group">
          <button type="submit" class="btn">Send Message</button>
        </div>
        
      </form>
    </div>
  </div>
</section>
