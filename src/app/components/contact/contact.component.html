<section class="card">
  <h2>Contact</h2>
  <p class="lead">Feel free to reach out — I respond to meaningful inquiries.</p>

  <div style="margin-top:1rem;">
    <a class="btn" [href]="'mailto:' + email">Email: {{ email }}</a>

    <div style="margin-top: .8rem; display:flex; gap:.8rem; align-items:center;">
      <a class="btn secondary" [href]="linkedin" target="_blank" rel="noopener">LinkedIn</a>
      <a class="btn secondary" [href]="github" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</section>
